# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=CredBuzz
server.port=8080

# ============================================
# DATABASE CONFIGURATION (H2 In-Memory)
# ============================================
spring.datasource.url=jdbc:h2:mem:credbuzz_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================
# JWT CONFIGURATION
# ============================================
# Secret key for signing JWTs (use a long random string in production)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351
jwt.expiration=2592000000

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=http://localhost:3000

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.security=DEBUG
logging.level.com.credbuzz=DEBUG

# ============================================
# ML SERVICE CONFIGURATION
# ============================================
# Enable/disable ML predictions (set to true when ML service is running)
ml.service.enabled=true

# ML service URL (Python FastAPI server)
ml.service.url=http://localhost:8000

# Timeout for ML service calls (milliseconds)
ml.service.timeout=5000
