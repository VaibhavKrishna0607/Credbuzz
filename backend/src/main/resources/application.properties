# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=CredBuzz
server.port=${PORT:8080}

# ============================================
# ACTIVE PROFILE
# ============================================
# Profiles: "local" (H2, zero setup), "dev" (local PostgreSQL), "prod" (Railway)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ============================================
# JPA / Hibernate (shared)
# ============================================
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351}
jwt.expiration=${JWT_EXPIRATION:2592000000}

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.security=INFO
logging.level.com.credbuzz=DEBUG

# ============================================
# ML SERVICE CONFIGURATION
# ============================================
ml.service.enabled=false
ml.service.url=http://localhost:8000
ml.service.timeout=5000
